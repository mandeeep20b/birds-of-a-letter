// ─── AUDIO ──────────────────────────────────────────
let AC=null,muted=false,ambientNodes=[];
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}
function tone(f,type,vol,atk,dec,start){
  const a=getAC();if(!a)return;
  try{const o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(0,a.currentTime+start);g.gain.linearRampToValueAtTime(vol,a.currentTime+start+atk);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+start+atk+dec);
  o.connect(g);g.connect(a.destination);o.start(a.currentTime+start);o.stop(a.currentTime+start+atk+dec+0.05);}catch(e){}
}
function toneSlide(f1,f2,type,vol,atk,dec,start){
  const a=getAC();if(!a)return;
  try{const o=a.createOscillator(),g=a.createGain();o.type=type;
  o.frequency.setValueAtTime(f1,a.currentTime+start);o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+start+atk+dec*0.5);
  g.gain.setValueAtTime(0,a.currentTime+start);g.gain.linearRampToValueAtTime(vol,a.currentTime+start+atk);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+start+atk+dec);
  o.connect(g);g.connect(a.destination);o.start(a.currentTime+start);o.stop(a.currentTime+start+atk+dec+0.05);}catch(e){}
}
function playWrong(){if(muted)return;toneSlide(200,120,'sine',0.12,0.01,0.22,0);}
function callRobin(){if(muted)return;toneSlide(1800,2200,'sine',0.13,0.01,0.07,0);toneSlide(2400,2000,'sine',0.10,0.01,0.07,0.10);}
function callBlueJay(){if(muted)return;toneSlide(900,1400,'square',0.07,0.01,0.09,0);toneSlide(900,1400,'square',0.07,0.01,0.09,0.13);toneSlide(1200,1000,'sine',0.06,0.01,0.12,0.28);}
function callBlackbird(){if(muted)return;[[880,0],[740,0.14],[660,0.28]].forEach(([f,t])=>toneSlide(f,f*1.08,'sine',0.14,0.02,0.12,t));}
function callNightingale(){if(muted)return;[[1200,0],[1400,0.1],[1100,0.2],[1500,0.3],[1300,0.42]].forEach(([f,t])=>toneSlide(f,f*.97,'sine',0.11,0.015,0.09,t));}
function callOwl(){if(muted)return;toneSlide(320,280,'sine',0.18,0.04,0.35,0);toneSlide(280,240,'sine',0.14,0.04,0.45,0.45);}
function callLyrebird(){if(muted)return;[1800,1400,900,1600,1200,800,2000,1500].forEach((f,i)=>toneSlide(f,f*.9,'sine',0.09,0.01,0.1,i*0.07));}
function playStreakCall(s){if(muted)return;if(s>=20)callLyrebird();else if(s>=15)callOwl();else if(s>=10)callNightingale();else if(s>=8)callBlackbird();else if(s>=5)callBlueJay();else if(s>=3)callRobin();}
function playLevelUp(){if(muted)return;[523,659,784,1047].forEach((f,i)=>tone(f,'triangle',0.16,0.02,0.16,i*0.18));}
function playGameOver(){if(muted)return;[440,350,280,220].forEach((f,i)=>tone(f,'sine',0.14,0.04,0.22,i*0.22));}
let ambTimer=0;
function startAmbient(){stopAmbient();if(muted)return;const a=getAC();if(!a)return;
  try{const buf=a.createBuffer(1,a.sampleRate*4,a.sampleRate);const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=a.createBufferSource();src.buffer=buf;src.loop=true;
  const flt=a.createBiquadFilter();flt.type='lowpass';flt.frequency.value=400;
  const g=a.createGain();g.gain.value=0.04;src.connect(flt);flt.connect(g);g.connect(a.destination);src.start();ambientNodes.push(src,g);}catch(e){}
  scheduleChirp();}
function scheduleChirp(){ambTimer=setTimeout(()=>{
  if(!muted&&(gs.state==='PLAYING'||gs.state==='MENU')){const f=600+Math.random()*800;toneSlide(f,f*1.3,'sine',0.04,0.008,0.06,0);if(Math.random()>.5)toneSlide(f*1.2,f*.95,'sine',0.03,0.008,0.08,0.1);}
  scheduleChirp();},2000+Math.random()*4000);}
function stopAmbient(){clearTimeout(ambTimer);ambientNodes.forEach(n=>{try{n.stop?n.stop():n.disconnect();}catch(e){}});ambientNodes=[];}

// ─── PERSISTENT STORAGE: LEADERBOARD ────────────────
const LB_KEY='bol_leaderboard';
let leaderboard=[];
async function loadLeaderboard(){
  try{const r=await window.storage.get(LB_KEY,true);if(r)leaderboard=JSON.parse(r.value)||[];}catch(e){leaderboard=[];}
}
async function saveLeaderboard(){
  try{await window.storage.set(LB_KEY,JSON.stringify(leaderboard),true);}catch(e){}
}
function addScore(name,score,level){
  leaderboard.push({name:name.toUpperCase().slice(0,4),score,level,date:new Date().toLocaleDateString()});
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,10);
  saveLeaderboard();
}
function isHighScore(score){return leaderboard.length<10||score>leaderboard[leaderboard.length-1].score;}

// ─── DEBRIS ──────────────────────────────────────────
const DTYPE=['twig','leaf','dryLeaf','pebble'];
function spawnDebris(x,y){
  const pieces=Array.from({length:5+Math.floor(Math.random()*5)},()=>({
    type:DTYPE[Math.floor(Math.random()*DTYPE.length)],
    ox:(Math.random()-.5)*70,oy:Math.random()*26,rot:Math.random()*Math.PI*2,
    scale:.6+Math.random()*.8,alpha:.85+Math.random()*.15}));
  gs.debris.push({x,y,pieces,age:0});
  if(gs.debris.length>40)gs.debris.shift();
}
function drawDebris(){
  gs.debris.forEach(d=>{d.age++;
    d.pieces.forEach(p=>{
      ctx.save();ctx.translate(d.x+p.ox,d.y+p.oy);ctx.rotate(p.rot+d.age*.002);ctx.globalAlpha=p.alpha;ctx.scale(p.scale,p.scale);
      if(p.type==='twig'){ctx.strokeStyle='#6d4c1a';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(14,0);ctx.moveTo(0,0);ctx.lineTo(6,-5);ctx.moveTo(-4,0);ctx.lineTo(-8,4);ctx.stroke();}
      else if(p.type==='leaf'){ctx.fillStyle='#8d6e1a';ctx.beginPath();ctx.ellipse(0,0,9,4,0,0,Math.PI*2);ctx.fill();}
      else if(p.type==='dryLeaf'){ctx.fillStyle='#a0522d';ctx.beginPath();ctx.moveTo(0,-7);ctx.quadraticCurveTo(8,0,0,7);ctx.quadraticCurveTo(-8,0,0,-7);ctx.fill();}
      else{ctx.fillStyle='#888878';ctx.beginPath();ctx.ellipse(0,0,6,4,.3,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
  });
  ctx.globalAlpha=1;
}

// ─── GROUND BIRDS ─────────────────────────────────────
const GROUND_Y=0.85,HUD_H=0.07;
function spawnGroundBirds(){
  gs.groundBirds=[];
  const n=3+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){
    const s=(i+1)/(n+1);
    gs.groundBirds.push({species:SPECIES[i%SPECIES.length],homeX:CW*(.12+s*.76),x:CW*(.12+s*.76),y:CH*GROUND_Y-14,bobPhase:Math.random()*Math.PI*2,flying:false});
  }
}
function launchBird(letter){
  const idle=gs.groundBirds.filter(b=>!b.flying);if(!idle.length)return;
  idle.sort((a,b)=>Math.abs(a.homeX-letter.x)-Math.abs(b.homeX-letter.x));
  const gb=idle[0];gb.flying=true;
  gs.flyingBirds.push({gb,x:gb.x,y:gb.y,tx:letter.x,ty:letter.y,phase:'up',prog:0,letterRef:letter,pecked:false,startX:gb.x,startY:gb.y});
}
function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function updateFlyingBirds(){
  gs.flyingBirds=gs.flyingBirds.filter(fb=>{
    if(fb.phase==='up'){fb.prog=Math.min(1,fb.prog+.048);const e=ease(fb.prog);fb.x=fb.startX+(fb.tx-fb.startX)*e;fb.y=fb.startY+(fb.ty-fb.startY)*e-Math.sin(fb.prog*Math.PI)*65;
      if(fb.prog>=1){fb.phase='peck';fb.prog=0;if(!fb.pecked){fb.pecked=true;fb.letterRef.active=false;spawnParticles(fb.tx,fb.ty);}}}
    else if(fb.phase==='peck'){fb.prog=Math.min(1,fb.prog+.09);fb.y=fb.ty+Math.sin(fb.prog*Math.PI*2)*-16;if(fb.prog>=1){fb.phase='down';fb.prog=0;fb.startX=fb.x;fb.startY=fb.y;}}
    else{fb.prog=Math.min(1,fb.prog+.038);const e=ease(fb.prog);fb.x=fb.startX+(fb.gb.homeX-fb.startX)*e;fb.y=fb.startY+(CH*GROUND_Y-14-fb.startY)*e-Math.sin(fb.prog*Math.PI)*42;if(fb.prog>=1){fb.gb.x=fb.gb.homeX;fb.gb.y=CH*GROUND_Y-14;fb.gb.flying=false;return false;}}
    return true;
  });
}

// ─── PARTICLES ───────────────────────────────────────
function spawnParticles(x,y){
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'];
  for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;gs.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,alpha:1,col:cols[i%cols.length],life:400,maxLife:400,size:2+Math.random()*3});}
}
function spawnPopup(text,x,y,col){gs.popups.push({text,x,y,vy:-1.1,alpha:1,col:col||'#fff',life:55});}

// ─── BIRD SPRITES ─────────────────────────────────────
function drawGB(sp,x,y,flip,scale,bob){
  ctx.save();ctx.translate(x,y+bob);if(flip)ctx.scale(-1,1);ctx.scale(scale,scale);
  ctx.fillStyle=sp.body;ctx.beginPath();ctx.ellipse(0,0,14,11,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.chest;ctx.beginPath();ctx.ellipse(5,4,7,6,.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.wing;ctx.beginPath();ctx.ellipse(-5,-1,10,6,-.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.wing;ctx.beginPath();ctx.moveTo(-12,2);ctx.lineTo(-20,0);ctx.lineTo(-12,6);ctx.closePath();ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(7,-3,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.eye;ctx.beginPath();ctx.arc(8,-3,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.beak;ctx.beginPath();ctx.moveTo(11,-1);ctx.lineTo(18,0);ctx.lineTo(11,2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#8d6e63';ctx.lineWidth=2;[-3,3].forEach(lx=>{ctx.beginPath();ctx.moveTo(lx,10);ctx.lineTo(lx,18);ctx.lineTo(lx-4,22);ctx.moveTo(lx,18);ctx.lineTo(lx+4,22);ctx.stroke();});
  ctx.restore();
}
function drawFB(sp,x,y,flip,wf){
  ctx.save();ctx.translate(x,y);if(flip)ctx.scale(-1,1);const w=Math.sin(wf)*.45;
  ctx.fillStyle=sp.body;ctx.beginPath();ctx.ellipse(0,0,13,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.chest;ctx.beginPath();ctx.ellipse(4,3,6,5,.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.wing;ctx.beginPath();ctx.moveTo(-2,-2);ctx.lineTo(-18,-2+w*18);ctx.lineTo(-10,4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-2,-2);ctx.lineTo(14,-2+w*18);ctx.lineTo(8,4);ctx.closePath();ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(6,-2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.eye;ctx.beginPath();ctx.arc(7,-2,1.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.beak;ctx.beginPath();ctx.moveTo(10,-1);ctx.lineTo(17,0);ctx.lineTo(10,2);ctx.closePath();ctx.fill();
  ctx.restore();
}

// ─── KEYBOARD VISUAL ─────────────────────────────────
function drawKeyboardVisual(cx,cy,activeSet,newSet,scale){
  scale=scale||1;
  const kw=Math.floor(34*scale),kh=Math.floor(30*scale),kr=4,gap=3;
  const offsets=[0,kw*.55,kw*.55+kw*.3];
  KB_ROWS.forEach((row,ri)=>{
    const rowW=row.length*(kw+gap);
    const sx=cx-rowW/2+offsets[ri]*0;
    // centre each row
    const totalW=row.length*(kw+gap)-gap;
    const startX=cx-totalW/2+ri*(kw*0.28);
    row.forEach((key,ki)=>{
      const kx=startX+ki*(kw+gap),ky=cy+ri*(kh+gap);
      const isNew=newSet&&newSet.includes(key.k);
      const isActive=activeSet&&activeSet.includes(key.k);
      const fc=FINGER_COLS[key.f]||'#555';
      ctx.fillStyle=isNew?fc:(isActive?'rgba(60,60,80,0.85)':'rgba(20,20,35,0.6)');
      ctx.strokeStyle=isNew?fc:(isActive?'rgba(150,150,200,0.5)':'rgba(80,80,100,0.3)');
      ctx.lineWidth=isNew?2.5:1;
      rr(ctx,kx,ky,kw,kh,kr);ctx.fill();ctx.stroke();
      if(isNew){ctx.shadowBlur=10;ctx.shadowColor=fc;}
      ctx.fillStyle=isNew?'white':(isActive?'rgba(200,200,220,0.8)':'rgba(100,100,130,0.5)');
      ctx.font=`bold ${Math.floor(12*scale)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(key.k,kx+kw/2,ky+kh/2);ctx.shadowBlur=0;
    });
  });
}

// ─── HELPERS ─────────────────────────────────────────
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function btn(x,y,t,col,w,h){w=w||220;h=h||44;ctx.fillStyle=col+'2a';ctx.strokeStyle=col;ctx.lineWidth=2;rr(ctx,x-w/2,y-h/2,w,h,10);ctx.fill();ctx.stroke();ctx.fillStyle=col;ctx.font='bold 17px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x,y);}
function inBtn(mx,my,cx,cy,w,h){w=w||220;h=h||44;return mx>cx-w/2&&mx<cx+w/2&&my>cy-h/2&&my<cy+h/2;}
function panel(x,y,w,h,r){ctx.fillStyle='rgba(8,18,38,0.88)';rr(ctx,x,y,w,h,r||20);ctx.fill();ctx.strokeStyle='rgba(100,140,200,0.25)';ctx.lineWidth=1.5;ctx.stroke();}

let highScore=0;
try{highScore=parseInt(localStorage.getItem('bol_hs'))||0;}catch(e){}
function saveHS(s){if(s>highScore){highScore=s;try{localStorage.setItem('bol_hs',s);}catch(e){}}}

// ─── LETTER INTRO SCREEN ─────────────────────────────
function drawLetterIntro(){
  const lvl=LEVELS[gs.lvlIdx];
  BG[lvl.bg](ctx,CW,CH,gs.frame,gs.bgSeeds,gs.paralax);
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,CW,CH);
  const pw=Math.min(680,CW*.88),ph=Math.min(480,CH*.82);
  panel(CW/2-pw/2,CH/2-ph/2,pw,ph,22);
  ctx.textAlign='center';ctx.textBaseline='top';
  // header
  ctx.fillStyle='#ffe066';ctx.font=`bold ${Math.min(26,pw*.05)}px Arial`;
  ctx.fillText('New Letters Unlocked!',CW/2,CH/2-ph/2+22);
  if(lvl.newLetters&&lvl.newLetters.length>0){
    // big letter pills
    const nl=lvl.newLetters;
    const pillW=52,gap=10,totalW=nl.length*(pillW+gap)-gap;
    const startX=CW/2-totalW/2;
    nl.forEach((l,i)=>{
      const px=startX+i*(pillW+gap),py=CH/2-ph/2+62;
      ctx.fillStyle='rgba(255,220,50,0.18)';rr(ctx,px,py,pillW,52,10);ctx.fill();
      ctx.strokeStyle='#ffe066';ctx.lineWidth=2;ctx.stroke();
      ctx.shadowBlur=12;ctx.shadowColor='#ffe066';
      ctx.fillStyle='white';ctx.font='bold 30px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(l,px+pillW/2,py+26);ctx.shadowBlur=0;
    });
  } else {
    ctx.fillStyle='rgba(180,210,255,0.8)';ctx.font='17px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Practice with all letters learned so far!',CW/2,CH/2-ph/2+90);
  }
  // keyboard visual — centred
  const kbScale=Math.min(1.0,pw/400);
  drawKeyboardVisual(CW/2, CH/2-ph/2+135, lvl.letterSet, lvl.newLetters||[], kbScale);
  // tip
  if(lvl.tip){
    ctx.fillStyle='rgba(180,220,255,0.85)';ctx.font=`${Math.min(15,pw*.032)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('💡 '+lvl.tip,CW/2,CH/2+ph/2-70);
  }
  // phase label
  if(lvl.phase){
    ctx.fillStyle='rgba(150,180,220,0.7)';ctx.font='13px Arial';
    ctx.fillText(lvl.phase,CW/2,CH/2+ph/2-48);
  }
  btn(CW/2,CH/2+ph/2-18,'Let\'s Go! →','#1aefaa',200,40);
}

  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(lvl.type==='bonus'){
    ctx.fillStyle='#ffe066';ctx.font=`bold ${Math.floor(CW*.05)}px Arial`;ctx.shadowBlur=16;ctx.shadowColor='#ffaa00';ctx.fillText('★ Bonus Level!',CW*.5,CH*.28);ctx.shadowBlur=0;
    ctx.fillStyle='white';ctx.font=`bold ${Math.floor(CW*.032)}px Arial`;ctx.fillText(lvl.name,CW*.5,CH*.38);
    ctx.fillStyle='rgba(255,230,100,0.85)';ctx.font='17px Arial';ctx.fillText(lvl.bonusMsg,CW*.5,CH*.47);
    ctx.fillStyle='rgba(200,220,255,0.8)';ctx.font='15px Arial';ctx.fillText('Spell: '+lvl.birdWords.join(' · '),CW*.5,CH*.54);

// ─── GAME FLOW ────────────────────────────────────────
function startGame(li){
  gs=mkState();gs.lvlIdx=li||0;
  initBg();spawnGroundBirds();
  // unlock all letters up to current level
  for(let i=0;i<=gs.lvlIdx;i++){const l=LEVELS[i];if(l.letterSet)l.letterSet.forEach(c=>{if(!gs.unlockedLetters.includes(c))gs.unlockedLetters.push(c);});}
  gs.state=GS.LETTER_INTRO;
  startAmbient();
}
function beginLevel(){
  const lvl=LEVELS[gs.lvlIdx];
  gs.letters=[];gs.particles=[];gs.popups=[];gs.flyingBirds=[];gs.debris=[];
  gs.hitCount=0;gs.spawnedCount=0;gs.lastSpawn=0;gs.streak=0;gs.lastStreakMilestone=0;
  spawnGroundBirds();
  if(lvl.type==='bonus'){gs.bonusWords=[...lvl.birdWords];gs.bonusWordIdx=0;gs.bonusLetterIdx=0;gs.bonusCurrentWord=gs.bonusWords[0];}
  else gs.bonusWords=null;
  gs.state=GS.PLAYING;
  saveProgress(gs.lvlIdx,gs.score,gs.unlockedLetters);
}
function levelComplete(){
  if(gs.state!==GS.PLAYING)return;
  saveHS(gs.score);
  gs.state=GS.LEVEL_COMPLETE;
  playLevelUp();
  saveProgress(gs.lvlIdx,gs.score,gs.unlockedLetters);
}
function goNext(){
  if(gs.lvlIdx<LEVELS.length-1){
    gs.lvlIdx++;
    // add new letters
    const nl=LEVELS[gs.lvlIdx];
    if(nl.letterSet)nl.letterSet.forEach(c=>{if(!gs.unlockedLetters.includes(c))gs.unlockedLetters.push(c);});
    gs.state=GS.LETTER_INTRO;
  } else {gs.state=GS.GAME_OVER;saveHS(gs.score);}
}
function checkForNameEntry(){
  if(isHighScore(gs.score)){gs.state=GS.NAME_ENTRY;gs.nameEntry='';}
  else gs.state=GS.GAME_OVER;
}

// ─── SPAWN ───────────────────────────────────────────
function spawnNormal(ts){
  const lvl=LEVELS[gs.lvlIdx];
  if(gs.letters.filter(l=>l.active).length>=lvl.maxOn)return;
  if(ts-gs.lastSpawn<lvl.spawnInterval)return;
  gs.lastSpawn=ts;
  const set=lvl.letterSet,ch=set[Math.floor(Math.random()*set.length)];
  let x,tries=0;do{x=CW*(.07+Math.random()*.86);tries++;}while(tries<20&&gs.letters.filter(l=>l.active).some(l=>Math.abs(l.x-x)<60));
  gs.letters.push({char:ch,x,y:-40,speed:lvl.fallSpeed*(.88+Math.random()*.24),active:true,wobble:Math.random()*Math.PI*2});
  gs.spawnedCount++;
}
function spawnBonus(ts){
  if(gs.letters.filter(l=>l.active).length>0)return;
  if(ts-gs.lastSpawn<900)return;
  if(!gs.bonusWords||gs.bonusWordIdx>=gs.bonusWords.length)return;
  const word=gs.bonusWords[gs.bonusWordIdx];
  if(gs.bonusLetterIdx>=word.length)return;
  gs.lastSpawn=ts;
  const ch=word[gs.bonusLetterIdx],x=CW*(.25+Math.random()*.5);
  gs.letters.push({char:ch,x,y:-40,speed:LEVELS[gs.lvlIdx].fallSpeed*(.9+Math.random()*.2),active:true,wobble:Math.random()*Math.PI*2,isBonus:true});
  gs.spawnedCount++;
}

document.addEventListener('keydown',e=>{
  const S=gs.state;
  if(S===GS.NAME_ENTRY){
    if(e.key==='Backspace'){gs.nameEntry=gs.nameEntry.slice(0,-1);return;}
    if((e.key==='Enter'||e.key===' ')&&gs.nameEntry.length>0){addScore(gs.nameEntry,gs.score,LEVELS[gs.lvlIdx].id);gs.state=GS.GAME_OVER;return;}
    if(gs.nameEntry.length<4&&e.key.length===1&&/[A-Za-z0-9]/.test(e.key)){gs.nameEntry+=e.key.toUpperCase();return;}
    return;
  }
  if(S===GS.PAUSED){if(e.key==='p'||e.key==='P'||e.key==='Escape')gs.state=GS.PLAYING;return;}
  if(S===GS.LETTER_INTRO){gs.state=GS.LEVEL_INTRO;gs.introTimer=100;return;}
  if(S===GS.LEVEL_INTRO){gs.introTimer=0;return;}
  if(S===GS.LEVEL_COMPLETE){if(e.key==='Enter'||e.key===' ')goNext();return;}
  if(S===GS.GAME_OVER){if(e.key==='Enter'||e.key===' ')gs.state=GS.MENU;return;}
  if(S===GS.MENU){if(e.key==='Enter'||e.key===' '){getAC();startGame(0);}return;}
  if(S!==GS.PLAYING)return;
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){gs.state=GS.PAUSED;return;}
  if(['Shift','Control','Alt','Meta','Tab','CapsLock'].includes(e.key))return;
  let key=e.key.toUpperCase();if(e.key===';')key=';';
  if(key.length>1&&key!==';')return;
  const now=performance.now();if(gs.lastKey[key]&&now-gs.lastKey[key]<80)return;gs.lastKey[key]=now;
  LEVELS[gs.lvlIdx].type==='bonus'?handleBonus(key):handleNormal(key);
});

function handleNormal(key){
  const matches=gs.letters.filter(l=>l.active&&l.char===key);
  if(!matches.length){playWrong();return;}
  matches.sort((a,b)=>b.y-a.y);const letter=matches[0];
  gs.streak++;checkStreakSound();
  const pts=10+(gs.streak>=5?Math.min(25,Math.floor(gs.streak/5)*5):0);
  gs.score+=pts;gs.hitCount++;launchBird(letter);spawnPopup('+'+pts,letter.x,letter.y-20,'#ffe566');
  if(gs.hitCount>=LEVELS[gs.lvlIdx].toWin)setTimeout(levelComplete,300);
}
function handleBonus(key){
  const word=gs.bonusWords[gs.bonusWordIdx];if(!word)return;
  const match=gs.letters.find(l=>l.active&&l.char===key);
  if(!match||key!==word[gs.bonusLetterIdx]){playWrong();return;}
  gs.streak++;checkStreakSound();const pts=15+(gs.streak>=5?Math.min(25,Math.floor(gs.streak/5)*5):0);
  gs.score+=pts;gs.hitCount++;launchBird(match);spawnPopup('+'+pts,match.x,match.y-20,'#ffe566');
  gs.bonusLetterIdx++;
  if(gs.bonusLetterIdx>=word.length){gs.bonusLetterIdx=0;gs.bonusWordIdx++;spawnPopup('✓ '+word+'!',CW*.5,CH*.18,'#ffe066');
    if(gs.bonusWordIdx>=gs.bonusWords.length)setTimeout(levelComplete,400);else gs.bonusCurrentWord=gs.bonusWords[gs.bonusWordIdx];}
}
function checkStreakSound(){const ms=[3,5,8,10,15,20];const next=ms.find(m=>m>gs.lastStreakMilestone&&gs.streak>=m);if(next){gs.lastStreakMilestone=next;playStreakCall(next);}}
function missLetter(letter){letter.active=false;gs.lives--;gs.streak=0;gs.lastStreakMilestone=0;spawnDebris(letter.x,CH*GROUND_Y+Math.random()*20);spawnPopup('MISS!',letter.x,letter.y,'#ff5555');playWrong();if(gs.lives<=0)setTimeout(()=>{saveHS(gs.score);checkForNameEntry();playGameOver();},300);}

// ─── CLICK HANDLER ───────────────────────────────────
canvas.addEventListener('click',e=>{
  const x=e.clientX,y=e.clientY,S=gs.state;
  if(S===GS.MENU){
    const by=CH/2-Math.min(440,CH*.82)/2+200;
    if(inBtn(x,y,CW*.5,by)){getAC();startGame(0);}
    else if(savedProgress&&inBtn(x,y,CW*.5,by+54,260,44)){getAC();const p=savedProgress;gs=mkState();gs.lvlIdx=p.lvlIdx;gs.score=p.score||0;gs.unlockedLetters=p.unlockedLetters||[];initBg();spawnGroundBirds();gs.state=GS.LEVEL_INTRO;gs.introTimer=100;startAmbient();}
    else if(inBtn(x,y,CW*.5,by+(savedProgress?108:54),220,40))gs.state=GS.LEADERBOARD;
    else if(inBtn(x,y,CW*.5,by+(savedProgress?150:96),220,40))gs.state=GS.INSTRUCTIONS;
    else if(x>CW-44&&y<50){muted=!muted;if(!muted)startAmbient();else stopAmbient();}
  } else if(S===GS.INSTRUCTIONS){if(inBtn(x,y,CW*.5,CH/2+Math.min(520,CH*.88)/2-22-CH/2+CH/2,180,38))gs.state=GS.MENU;}
  else if(S===GS.LEADERBOARD){if(inBtn(x,y,CW*.5,CH/2+Math.min(520,CH*.85)/2-22,200,38))gs.state=GS.MENU;}
  else if(S===GS.LETTER_INTRO){gs.state=GS.LEVEL_INTRO;gs.introTimer=100;}
  else if(S===GS.LEVEL_INTRO){gs.introTimer=0;}
  else if(S===GS.LEVEL_COMPLETE){if(inBtn(x,y,CW*.5,CH*.68)||inBtn(x,y,CW*.5,CH*.76))goNext();}
  else if(S===GS.GAME_OVER){
    if(inBtn(x,y,CW*.5,CH*.70,240,46)){gs.state=GS.MENU;startGame(0);}
    else if(inBtn(x,y,CW*.5,CH*.80,240,42))gs.state=GS.LEADERBOARD;
    else if(inBtn(x,y,CW*.5,CH*.89,240,40))gs.state=GS.MENU;
  } else if(S===GS.PAUSED){
    if(inBtn(x,y,CW*.5,CH*.57))gs.state=GS.PLAYING;
    else if(inBtn(x,y,CW*.5,CH*.67))gs.state=GS.MENU;
  } else if(S===GS.NAME_ENTRY){
    if(gs.nameEntry.length>0&&inBtn(x,y,CW*.5,CH/2+Math.min(260,CH*.42)/2-20,160,36)){addScore(gs.nameEntry,gs.score,LEVELS[gs.lvlIdx].id);gs.state=GS.GAME_OVER;}
  } else if(S===GS.PLAYING&&x>CW-44&&y<CH*HUD_H){muted=!muted;if(!muted)startAmbient();else stopAmbient();}
});

document.addEventListener('visibilitychange',()=>{if(document.hidden&&gs.state===GS.PLAYING)gs.state=GS.PAUSED;});

// ─── MAIN LOOP ────────────────────────────────────────
function loop(ts){
  ctx.clearRect(0,0,CW,CH);gs.frame++;gs.paralax+=0.18;
  const S=gs.state,lvl=LEVELS[gs.lvlIdx];
  if(S===GS.MENU)drawMenu();
  else if(S===GS.INSTRUCTIONS)drawInstructions();
  else if(S===GS.LEADERBOARD)drawLeaderboard();
  else if(S===GS.NAME_ENTRY)drawNameEntry();
  else if(S===GS.LETTER_INTRO)drawLetterIntro();
  else if(S===GS.LEVEL_INTRO){drawLevelIntro();gs.introTimer--;if(gs.introTimer<=0)beginLevel();}
  else if(S===GS.PLAYING){
    drawBg(lvl.bg);
    lvl.type==='bonus'?spawnBonus(ts):spawnNormal(ts);
    gs.letters.forEach(l=>{if(!l.active)return;l.y+=l.speed;if(l.y>CH*GROUND_Y)missLetter(l);else drawLetter(l,gs.lvlIdx,lvl.type==='bonus');});
    gs.letters=gs.letters.filter(l=>l.active);
    gs.particles=gs.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=16;p.alpha=Math.max(0,(p.life/p.maxLife)**2);if(p.alpha>0.01){ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;return true;}return false;});
    gs.groundBirds.forEach(b=>{if(b.flying)return;b.bobPhase+=.045;drawGB(b.species,b.x,b.y,b.x>CW*.5,1.2,Math.sin(b.bobPhase)*3);});
    updateFlyingBirds();gs.flyingBirds.forEach(fb=>drawFB(fb.gb.species,fb.x,fb.y,fb.x>(fb.gb?fb.gb.homeX:CW*.5),gs.frame*.35));
    gs.popups=gs.popups.filter(p=>{p.y+=p.vy;p.life--;p.alpha=Math.max(0,p.life/55);if(p.alpha>0){ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1;return true;}return false;});
    if(lvl.type==='bonus')drawBonusBar();
    drawHUD(lvl);
  }
  else if(S===GS.PAUSED){drawBg(lvl.bg);gs.groundBirds.forEach(b=>{if(!b.flying)drawGB(b.species,b.x,b.y,b.x>CW*.5,1.2,0);});gs.letters.forEach(l=>{if(l.active)drawLetter(l,gs.lvlIdx,lvl.type==='bonus');});drawHUD(lvl);drawPaused();}
  else if(S===GS.LEVEL_COMPLETE)drawLevelComplete();
  else if(S===GS.GAME_OVER)drawGameOver();
  requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────
loadProgress();
loadLeaderboard().then(()=>{initBg();requestAnimationFrame(loop);});
</script>
