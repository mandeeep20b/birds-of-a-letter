<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let CW,CH;
function resize(){CW=canvas.width=window.innerWidth;CH=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// ══════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════
let AC=null,muted=false,ambientNodes=[];
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}

function tone(freq,type,vol,atk,dec,start,dur){
  const a=getAC();if(!a)return;
  try{
    const o=a.createOscillator(),g=a.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,a.currentTime+start);
    g.gain.setValueAtTime(0,a.currentTime+start);
    g.gain.linearRampToValueAtTime(vol,a.currentTime+start+atk);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+start+atk+dec);
    o.connect(g);g.connect(a.destination);
    o.start(a.currentTime+start);o.stop(a.currentTime+start+atk+dec+0.05);
  }catch(e){}
}
function toneSlide(f1,f2,type,vol,atk,dec,start){
  const a=getAC();if(!a)return;
  try{
    const o=a.createOscillator(),g=a.createGain();
    o.type=type;
    o.frequency.setValueAtTime(f1,a.currentTime+start);
    o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+start+atk+dec*0.5);
    g.gain.setValueAtTime(0,a.currentTime+start);
    g.gain.linearRampToValueAtTime(vol,a.currentTime+start+atk);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+start+atk+dec);
    o.connect(g);g.connect(a.destination);
    o.start(a.currentTime+start);o.stop(a.currentTime+start+atk+dec+0.05);
  }catch(e){}
}

// Wrong key — soft low thud
function playWrong(){
  if(muted)return;
  toneSlide(200,120,'sine',0.12,0.01,0.22,0);
}

// ── STREAK BIRD CALLS ──────────────────────────────────────────
// streak 3 → Robin: bright 2-note chirp
function callRobin(){
  if(muted)return;
  toneSlide(1800,2200,'sine',0.13,0.01,0.07,0);
  toneSlide(2400,2000,'sine',0.10,0.01,0.07,0.10);
}
// streak 5 → Blue Jay: sharp double call
function callBlueJay(){
  if(muted)return;
  toneSlide(900,1400,'square',0.07,0.01,0.09,0);
  toneSlide(900,1400,'square',0.07,0.01,0.09,0.13);
  toneSlide(1200,1000,'sine',0.06,0.01,0.12,0.28);
}
// streak 8 → Blackbird: fluty 3-note descending
function callBlackbird(){
  if(muted)return;
  [[880,0],[740,0.14],[660,0.28]].forEach(([f,t])=>toneSlide(f,f*1.08,'sine',0.14,0.02,0.12,t));
}
// streak 10 → Nightingale: 5-note warble
function callNightingale(){
  if(muted)return;
  [[1200,0],[1400,0.1],[1100,0.2],[1500,0.3],[1300,0.42]].forEach(([f,t])=>
    toneSlide(f,f*(0.95+Math.random()*0.1),'sine',0.11,0.015,0.09,t));
}
// streak 15 → Owl: deep resonant hoot pair
function callOwl(){
  if(muted)return;
  toneSlide(320,280,'sine',0.18,0.04,0.35,0);
  toneSlide(280,240,'sine',0.14,0.04,0.45,0.45);
}
// streak 20 → Lyrebird: layered cascade
function callLyrebird(){
  if(muted)return;
  const notes=[1800,1400,900,1600,1200,800,2000,1500];
  notes.forEach((f,i)=>toneSlide(f,f*0.9,'sine',0.09,0.01,0.1,i*0.07));
}

function playStreakCall(streak){
  if(muted)return;
  if(streak>=20)callLyrebird();
  else if(streak>=15)callOwl();
  else if(streak>=10)callNightingale();
  else if(streak>=8)callBlackbird();
  else if(streak>=5)callBlueJay();
  else if(streak>=3)callRobin();
}

function playLevelUp(){
  if(muted)return;
  [523,659,784,1047].forEach((f,i)=>{
    tone(f,'triangle',0.16,0.02,0.16,i*0.18,0.2);
  });
}
function playGameOver(){
  if(muted)return;
  [440,350,280,220].forEach((f,i)=>tone(f,'sine',0.14,0.04,0.22,i*0.22,0.25));
}

// ── AMBIENT SOUNDSCAPE ─────────────────────────────────────────
// Procedural: layered wind + random soft chirps looping
let ambTimer=0,ambInterval=0;
function startAmbient(){
  stopAmbient();
  if(muted)return;
  const a=getAC();if(!a)return;
  // Wind: filtered noise
  try{
    const buf=a.createBuffer(1,a.sampleRate*4,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=a.createBufferSource();
    src.buffer=buf;src.loop=true;
    const flt=a.createBiquadFilter();flt.type='lowpass';flt.frequency.value=400;
    const g=a.createGain();g.gain.value=0.04;
    src.connect(flt);flt.connect(g);g.connect(a.destination);
    src.start();
    ambientNodes.push(src,g);
  }catch(e){}
  scheduleChirp();
}
function scheduleChirp(){
  if(muted)return;
  const delay=2000+Math.random()*4000;
  ambTimer=setTimeout(()=>{
    if(!muted&&(gs.state==='PLAYING'||gs.state==='MENU')){
      // soft random ambient chirp
      const f=600+Math.random()*800;
      toneSlide(f,f*1.3,'sine',0.04,0.008,0.06,0);
      if(Math.random()>0.5)toneSlide(f*1.2,f*0.95,'sine',0.03,0.008,0.08,0.1);
    }
    scheduleChirp();
  },delay);
}
function stopAmbient(){
  clearTimeout(ambTimer);
  ambientNodes.forEach(n=>{try{n.stop?n.stop():n.disconnect();}catch(e){}});
  ambientNodes=[];
}

const GROUND_Y=0.85,HUD_H=0.07,DEBOUNCE=80;
const SPECIES=[

];

// ══════════════════════════════════════════
// LEVELS
// ══════════════════════════════════════════
const LEVELS=[

  {id:'B2',type:'bonus',name:'Bonus: Feather Trail!',birdWords:['JADE','KALE','ISLE','SILK'],letterSet:'ASDFGJKLIE'.split(''),fallSpeed:2.2,bg:'lake',bonusMsg:'Spell the words!'},

  {id:'B3',type:'bonus',name:'Bonus: Sky Watchers!',birdWords:['TEAL','KITE','RUDDY','TURKEY'],letterSet:'ASDFGJKL;EIRUTY'.split(''),fallSpeed:3.0,bg:'sky',bonusMsg:'Spell the bird names!'},

  {id:10,type:'normal',name:'Night Migration', letterSet:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split(''),spawnInterval:800,fallSpeed:4.5,maxOn:6,toWin:50,bg:'night_migration'},
];

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
let gs={};
function mkState(){return{
  state:'MENU',lvlIdx:0,score:0,lives:5,
  letters:[],particles:[],popups:[],groundBirds:[],flyingBirds:[],
  debris:[],  // {x, y, pieces:[{type,ox,oy,rot,scale,alpha,spread}]}
  streak:0,frame:0,hitCount:0,spawnedCount:0,
  lastSpawn:0,lastKey:{},introTimer:0,
  bgSeeds:{stars:[],clouds:[],trees:[],mountains:[]},
  paralax:0,
  bonusWords:null,bonusWordIdx:0,bonusLetterIdx:0,bonusCurrentWord:'',
  lastStreakMilestone:0,
};}
gs=mkState();

function initBg(){
  gs.bgSeeds.stars=Array.from({length:120},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.4,tw:Math.random()*200}));
  gs.bgSeeds.clouds=[{x:0.1,y:0.1,w:140,h:55},{x:0.45,y:0.07,w:175,h:65},{x:0.76,y:0.14,w:110,h:45}];
  gs.bgSeeds.trees=Array.from({length:10},(_,i)=>({x:i/9,h:0.12+Math.random()*0.22,w:0.025+Math.random()*0.015,far:i%3===0}));
  gs.bgSeeds.mountains=[
    {pts:[0,1,0.2,0.32,0.42,1],c:'#5d6d7e'},{pts:[0.28,1,0.52,0.22,0.72,1],c:'#4a5568'},
    {pts:[0.55,1,0.78,0.15,1.0,1],c:'#6b4f3a'}
  ];
}

// ══════════════════════════════════════════
// GROUND DEBRIS SYSTEM
// ══════════════════════════════════════════
const DEBRIS_TYPES=['twig','leaf','pebble','dryLeaf'];

function spawnDebris(x,y){
  // Each crash spawns a cluster of debris pieces at that x position
  const count=5+Math.floor(Math.random()*5);
  const pieces=[];
  for(let i=0;i<count;i++){
    pieces.push({
      type:DEBRIS_TYPES[Math.floor(Math.random()*DEBRIS_TYPES.length)],
      ox:(Math.random()-0.5)*70,   // horizontal spread from impact x
      oy:(Math.random())*28,        // vertical offset within ground strip
      rot:Math.random()*Math.PI*2,
      scale:0.6+Math.random()*0.8,
      alpha:0.85+Math.random()*0.15,
      spread:0,maxSpread:30+Math.random()*40,  // how far it will drift outward
    });
  }
  // slowly spread existing nearby clusters
  gs.debris.forEach(d=>{
    if(Math.abs(d.x-x)<120) d.spreading=true;
  });
  gs.debris.push({x,y,pieces,spreading:false,age:0});
  // cap total debris clusters
  if(gs.debris.length>40) gs.debris.shift();
}

function drawDebris(){
  gs.debris.forEach(d=>{
    d.age++;
    if(d.spreading&&d.spread<d.maxSpread) d.spread+=0.4;
    d.pieces.forEach((p,i)=>{
      const spreadFactor=d.spread/Math.max(1,d.maxSpread);
      const px=d.x+p.ox*(1+spreadFactor*0.6);
      const py=d.y+p.oy;
      ctx.save();
      ctx.translate(px,py);
      ctx.rotate(p.rot+d.age*0.002);
      ctx.globalAlpha=p.alpha;
      ctx.scale(p.scale,p.scale);
      drawDebrisPiece(ctx,p.type);
      ctx.restore();
    });
  });
  ctx.globalAlpha=1;
}

function drawDebrisPiece(c,type){
  if(type==='twig'){
    c.strokeStyle='#6d4c1a'; c.lineWidth=2.5;
    c.beginPath(); c.moveTo(-14,0); c.lineTo(14,0);
    c.moveTo(0,0); c.lineTo(6,-5);
    c.moveTo(-4,0); c.lineTo(-8,4);
    c.stroke();
  } else if(type==='leaf'){
    c.fillStyle='#8d6e1a';
    c.beginPath(); c.ellipse(0,0,9,4,0,0,Math.PI*2); c.fill();
    c.strokeStyle='#6d4c10'; c.lineWidth=1;
    c.beginPath(); c.moveTo(-9,0); c.lineTo(9,0); c.stroke();
  } else if(type==='dryLeaf'){
    c.fillStyle='#a0522d';
    c.beginPath(); c.moveTo(0,-7); c.quadraticCurveTo(8,0,0,7); c.quadraticCurveTo(-8,0,0,-7); c.fill();
    c.strokeStyle='#7a3c20'; c.lineWidth=1;
    c.beginPath(); c.moveTo(0,-7); c.lineTo(0,7); c.stroke();
  } else { // pebble
    c.fillStyle='#888878';
    c.beginPath(); c.ellipse(0,0,6,4,0.3,0,Math.PI*2); c.fill();
    c.fillStyle='rgba(255,255,255,0.2)';
    c.beginPath(); c.ellipse(-1,-1,2,1,0.5,0,Math.PI*2); c.fill();
  }
}

// ══════════════════════════════════════════
// GROUND BIRDS
// ══════════════════════════════════════════
function spawnGroundBirds(){
  gs.groundBirds=[];
  const count=3+Math.floor(Math.random()*2); // 3-4
  for(let i=0;i<count;i++){
    const sp=SPECIES[i%SPECIES.length];
    const slot=(i+1)/(count+1);
    gs.groundBirds.push({
      species:sp,
      homeX:CW*(0.12+slot*0.76),
      x:CW*(0.12+slot*0.76),
      y:CH*GROUND_Y-14,
      bobPhase:Math.random()*Math.PI*2,
      flying:false,
    });
  }
}

// ══════════════════════════════════════════
// FLYING BIRDS
// ══════════════════════════════════════════
function launchBird(letter){
  const idle=gs.groundBirds.filter(b=>!b.flying);
  if(!idle.length)return;
  idle.sort((a,b)=>Math.abs(a.homeX-letter.x)-Math.abs(b.homeX-letter.x));
  const gb=idle[0]; gb.flying=true;
  gs.flyingBirds.push({gb,x:gb.x,y:gb.y,tx:letter.x,ty:letter.y,
    phase:'up',prog:0,letterRef:letter,pecked:false,
    startX:gb.x,startY:gb.y});
}

function updateFlyingBirds(){
  gs.flyingBirds=gs.flyingBirds.filter(fb=>{
    if(fb.phase==='up'){
      fb.prog=Math.min(1,fb.prog+0.048);
      const e=ease(fb.prog);
      fb.x=fb.startX+(fb.tx-fb.startX)*e;
      fb.y=fb.startY+(fb.ty-fb.startY)*e-Math.sin(fb.prog*Math.PI)*65;
      if(fb.prog>=1){
        fb.phase='peck';fb.prog=0;
        if(!fb.pecked){
          fb.pecked=true;
          fb.letterRef.active=false;
          spawnParticles(fb.tx,fb.ty);
        }
      }
    } else if(fb.phase==='peck'){
      fb.prog=Math.min(1,fb.prog+0.09);
      fb.y=fb.ty+Math.sin(fb.prog*Math.PI*2)*-16;
      if(fb.prog>=1){fb.phase='down';fb.prog=0;fb.startX=fb.x;fb.startY=fb.y;}
    } else {
      fb.prog=Math.min(1,fb.prog+0.038);
      const e=ease(fb.prog);
      fb.x=fb.startX+(fb.gb.homeX-fb.startX)*e;
      fb.y=fb.startY+(CH*GROUND_Y-14-fb.startY)*e-Math.sin(fb.prog*Math.PI)*42;
      if(fb.prog>=1){fb.gb.x=fb.gb.homeX;fb.gb.y=CH*GROUND_Y-14;fb.gb.flying=false;return false;}
    }
    return true;
  });
}
function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

// ══════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════
function spawnParticles(x,y){
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'];
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    gs.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,
      alpha:1,col:cols[Math.floor(Math.random()*cols.length)],
      life:400,maxLife:400,size:2+Math.random()*3});
  }
}
function spawnPopup(text,x,y,col){
  gs.popups.push({text,x,y,vy:-1.1,alpha:1,col:col||'#fff',life:55});
}

// ══════════════════════════════════════════
// BACKGROUNDS
// ══════════════════════════════════════════
function drawBg(key){(BACKGROUNDS[key]||BACKGROUNDS.backyard)(ctx,CW,CH,gs.frame,gs.bgSeeds,gs.paralax);}

function drawClouds(ctx,W,H,clouds,px,col){
  clouds.forEach(c=>{
    ctx.fillStyle=col;
    const cx=(c.x*W+px*0.06)%W;
    [[0,0,c.w/2,c.h/2],[-.28,.1,c.w*.32,c.h*.42],[.28,.1,c.w*.35,c.h*.42]].forEach(([dx,dy,rx,ry])=>{
      ctx.beginPath();ctx.ellipse(cx+dx*c.w,c.y*H+dy*c.h,rx,ry,0,0,Math.PI*2);ctx.fill();
    });
  });
}

const BACKGROUNDS={
  backyard(ctx,W,H,fc,s,px){
    let g=ctx.createLinearGradient(0,0,0,H*GROUND_Y);
    g.addColorStop(0,'#87CEEB');g.addColorStop(1,'#d4f1b4');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H*GROUND_Y);
    drawClouds(ctx,W,H,s.clouds,px,'rgba(255,255,255,0.85)');
    ctx.strokeStyle='#5c3a1e';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(W*.82,H*GROUND_Y);ctx.lineTo(W*.82,H*.62);ctx.stroke();
    ctx.fillStyle='#8B5E3C';ctx.fillRect(W*.82-28,H*.62-10,56,12);ctx.fillRect(W*.82-18,H*.62-22,36,12);
    let gg=ctx.createLinearGradient(0,H*GROUND_Y,0,H);
    gg.addColorStop(0,'#4caf50');gg.addColorStop(1,'#388e3c');
    ctx.fillStyle=gg;ctx.fillRect(0,H*GROUND_Y,W,H*(1-GROUND_Y));
    drawDebris();
  },
  dusk(ctx,W,H,fc,s,px){
    let g=ctx.createLinearGradient(0,0,0,H*GROUND_Y);
    g.addColorStop(0,'#1a1a2e');g.addColorStop(.4,'#e55a1c');g.addColorStop(1,'#f9a825');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H*GROUND_Y);
    ctx.fillStyle='rgba(255,200,50,0.9)';ctx.beginPath();ctx.arc(W*.75,H*.6,42,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,150,30,0.35)';ctx.beginPath();ctx.arc(W*.75,H*.6,65,0,Math.PI*2);ctx.fill();
    [.05,.18,.3,.68,.8,.92].forEach(tx=>{
      ctx.fillStyle='#1a0a00';
      ctx.beginPath();ctx.moveTo(tx*W,H*GROUND_Y);ctx.lineTo(tx*W-W*.025,H*GROUND_Y);ctx.lineTo(tx*W,H*.5);ctx.closePath();ctx.fill();
    });
    let gg=ctx.createLinearGradient(0,H*GROUND_Y,0,H);
    gg.addColorStop(0,'#2d1a00');gg.addColorStop(1,'#1a0a00');
    ctx.fillStyle=gg;ctx.fillRect(0,H*GROUND_Y,W,H*(1-GROUND_Y));
    drawDebris();
  },
  meadow(ctx,W,H,fc,s,px){
    let g=ctx.createLinearGradient(0,0,0,H*GROUND_Y);
    g.addColorStop(0,'#a8edea');g.addColorStop(1,'#fed6e3');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H*GROUND_Y);
    drawClouds(ctx,W,H,s.clouds,px,'rgba(255,255,255,0.78)');
    let gg=ctx.createLinearGradient(0,H*GROUND_Y,0,H);
    gg.addColorStop(0,'#66bb6a');gg.addColorStop(1,'#43a047');
    ctx.fillStyle=gg;ctx.fillRect(0,H*GROUND_Y,W,H*(1-GROUND_Y));
    for(let i=0;i<18;i++){
      const fx=W*(.03+i*.055),fy=H*GROUND_Y+8+Math.sin(i)*6;
      ctx.fillStyle=['#ff6b9d','#ffd93d','#6bcb77','#4d96ff'][i%4];
      ctx.beginPath();ctx.arc(fx,fy,6,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#388e3c';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(fx,fy+6);ctx.lineTo(fx,fy+16);ctx.stroke();
    }
    drawDebris();
  },
  forest(ctx,W,H,fc,s,px){
    let g=ctx.createLinearGradient(0,0,0,H*GROUND_Y);

  storm(ctx,W,H,fc,s,px){

    if(fc%180<8){ctx.strokeStyle=`rgba(200,220,255,${1-(fc%180)/8})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*.6,0);ctx.lineTo(W*.58,H*.3);ctx.lineTo(W*.62,H*.3);ctx.lineTo(W*.59,H*.6);ctx.stroke();}
    s.mountains.forEach(m=>{ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.moveTo(m.pts[0]*W,m.pts[1]*H);for(let i=2;i<m.pts.length;i+=2)ctx.lineTo(m.pts[i]*W,m.pts[i+1]*H);ctx.closePath();ctx.fill();});

    s.stars.forEach(st=>{const a=0.5+0.5*Math.sin(fc*.02+st.tw);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(st.x*W,st.y*H*GROUND_Y,st.r,0,Math.PI*2);ctx.fill();});

// BIRD SPRITE DRAWING
// ══════════════════════════════════════════
function drawGroundBird(sp,x,y,flip,scale,bob){
  ctx.save();ctx.translate(x,y+bob);if(flip)ctx.scale(-1,1);ctx.scale(scale,scale);
  ctx.fillStyle=sp.body;ctx.beginPath();ctx.ellipse(0,0,14,11,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.chest;ctx.beginPath();ctx.ellipse(5,4,7,6,.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.wing;ctx.beginPath();ctx.ellipse(-5,-1,10,6,-.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.wing;ctx.beginPath();ctx.moveTo(-12,2);ctx.lineTo(-20,0);ctx.lineTo(-12,6);ctx.closePath();ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(7,-3,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.eye;ctx.beginPath();ctx.arc(8,-3,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(9,-4,.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.beak;ctx.beginPath();ctx.moveTo(11,-1);ctx.lineTo(18,0);ctx.lineTo(11,2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#8d6e63';ctx.lineWidth=2;
  [-3,3].forEach(lx=>{ctx.beginPath();ctx.moveTo(lx,10);ctx.lineTo(lx,18);ctx.lineTo(lx-4,22);ctx.moveTo(lx,18);ctx.lineTo(lx+4,22);ctx.stroke();});
  ctx.restore();
}
function drawFlyingBird(sp,x,y,flip,wf){
  ctx.save();ctx.translate(x,y);if(flip)ctx.scale(-1,1);
  const w=Math.sin(wf)*.45;
  ctx.fillStyle=sp.body;ctx.beginPath();ctx.ellipse(0,0,13,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.chest;ctx.beginPath();ctx.ellipse(4,3,6,5,.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.wing;
  ctx.beginPath();ctx.moveTo(-2,-2);ctx.lineTo(-18,-2+w*18);ctx.lineTo(-10,4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-2,-2);ctx.lineTo(14,-2+w*18);ctx.lineTo(8,4);ctx.closePath();ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(6,-2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.eye;ctx.beginPath();ctx.arc(7,-2,1.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sp.beak;ctx.beginPath();ctx.moveTo(10,-1);ctx.lineTo(17,0);ctx.lineTo(10,2);ctx.closePath();ctx.fill();
  ctx.restore();
}

const GLOWS=['','#88aaff','#88aaff','#44dd88','#44dd88','#ff8844','#ff8844','#ff4444','#ff4444','#cc44ff','#cc44ff','#ffee22','#ffee22','#ffee22'];
function drawLetter(l,li,isBonus){
  const wobble=Math.sin(gs.frame*.05+l.wobble)*3;
  const lx=l.x+wobble,ly=l.y;
  const glow=isBonus?'#ffee22':(GLOWS[li]||'#88aaff');
  ctx.save();
  ctx.shadowBlur=isBonus?14:8;ctx.shadowColor=glow;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  rr(ctx,lx-24,ly-20,48,40,10);ctx.fill();
  ctx.strokeStyle=glow;ctx.lineWidth=isBonus?2.5:1.5;ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='white';ctx.font='bold 28px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(l.char,lx,ly);
  ctx.restore();
}

function drawHUD(lvl){
  const hh=CH*HUD_H;
  ctx.fillStyle='rgba(10,20,40,0.84)';ctx.fillRect(0,0,CW,hh);
  ctx.fillStyle='white';ctx.font='bold 19px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Score: '+gs.score,CW*.02,hh*.5);
  if(gs.streak>=3){
    ctx.fillStyle='#ffd700';ctx.font='bold 13px Arial';
    const labels={3:'🐦',5:'🔵',8:'🖤',10:'🎶',15:'🦉',20:'🏆'};
    const icon=Object.entries(labels).reverse().find(([k])=>gs.streak>=k)?.[1]||'🔥';
    ctx.fillText(icon+' ×'+gs.streak,CW*.19,hh*.5);
  }
  ctx.fillStyle=lvl.type==='bonus'?'#ffe066':'white';
  ctx.font='bold 17px Arial';ctx.textAlign='center';
  ctx.fillText((lvl.type==='bonus'?'★ ':'')+lvl.name,CW*.5,hh*.5);
  for(let i=0;i<gs.lives;i++){
    const lx=CW-36-(gs.lives-1-i)*24,ly=hh*.5;
    ctx.fillStyle='#1a7a6e';ctx.beginPath();ctx.arc(lx,ly,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8782a';ctx.beginPath();ctx.arc(lx+3,ly+3,4,0,Math.PI*2);ctx.fill();
  }
  const prog=lvl.type==='bonus'
    ? (gs.bonusWords?(gs.bonusWordIdx*(gs.bonusCurrentWord?gs.bonusCurrentWord.length:1)+gs.bonusLetterIdx)/Math.max(1,gs.bonusWords.reduce((a,w)=>a+w.length,0)):0)
    : Math.min(1,gs.hitCount/lvl.toWin);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,hh,CW,4);
  const pgr=ctx.createLinearGradient(0,0,CW*prog,0);
  pgr.addColorStop(0,lvl.type==='bonus'?'#ffe066':'#1aefaa');
  pgr.addColorStop(1,lvl.type==='bonus'?'#ff922b':'#00aaff');
  ctx.fillStyle=pgr;ctx.fillRect(0,hh,CW*prog,4);
  ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='15px Arial';ctx.textAlign='right';
  ctx.fillText(muted?'🔇':'🔊',CW-8,hh*.5+4);
  ctx.fillStyle='rgba(180,200,255,0.6)';ctx.font='12px Arial';
  ctx.fillText('Best: '+highScore,CW*.88,hh*.5);
}

// ══════════════════════════════════════════
// BONUS WORD DISPLAY
// ══════════════════════════════════════════
function drawBonusBar(){
  if(!gs.bonusWords)return;
  const y=CH*.94;
  ctx.textAlign='center';ctx.textBaseline='middle';
  const words=gs.bonusWords;
  const charW=22,gap=50;
  const totalW=words.reduce((a,w)=>a+w.length*charW+gap,0)-gap;
  let sx=CW*.5-totalW*.5;
  words.forEach((w,wi)=>{
    const done=wi<gs.bonusWordIdx;
    const cur=wi===gs.bonusWordIdx;
    for(let li=0;li<w.length;li++){
      const typed=li<(done?w.length:(cur?gs.bonusLetterIdx:0));
      const active=cur&&li===gs.bonusLetterIdx;
      ctx.fillStyle=typed?'#ffe066':(active?'white':'rgba(255,255,255,0.28)');
      if(active){ctx.shadowBlur=10;ctx.shadowColor='#ffe066';}
      ctx.font=`bold ${active?16:14}px Arial`;
      ctx.fillText(w[li],sx+li*charW,y);
      ctx.shadowBlur=0;
    }
    ctx.strokeStyle=done?'#ffe066':'rgba(255,255,255,0.18)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx-2,y+12);ctx.lineTo(sx+w.length*charW-6,y+12);ctx.stroke();
    sx+=w.length*charW+gap;
  });
}

    ctx.fillStyle='white';ctx.font=`bold ${Math.floor(CW*.032)}px Arial`;ctx.fillText(lvl.name,CW*.5,CH*.38);
    ctx.fillStyle='rgba(255,230,100,0.85)';ctx.font='17px Arial';ctx.fillText(lvl.bonusMsg,CW*.5,CH*.47);
    ctx.fillStyle='rgba(200,220,255,0.8)';ctx.font='15px Arial';ctx.fillText('Spell: '+lvl.birdWords.join(' · '),CW*.5,CH*.54);
  } else {
    ctx.fillStyle='#ffd700';ctx.font=`bold ${Math.floor(CW*.055)}px Arial`;
    ctx.shadowBlur=16;ctx.shadowColor='gold';ctx.fillText('Level '+lvl.id,CW*.5,CH*.3);ctx.shadowBlur=0;
    ctx.fillStyle='white';ctx.font=`bold ${Math.floor(CW*.034)}px Arial`;ctx.fillText(lvl.name,CW*.5,CH*.42);
    ctx.fillStyle='rgba(180,210,255,0.8)';ctx.font='16px Arial';ctx.fillText('Hit '+lvl.toWin+' letters to advance',CW*.5,CH*.52);
  }
  SPECIES.slice(0,3).forEach((sp,i)=>drawGroundBird(sp,CW*(.32+i*.18),CH*.68,i%2===0,1.3,Math.sin(gs.frame*.06+i)*4));
  ctx.fillStyle='rgba(200,220,255,0.75)';ctx.font='16px Arial';ctx.fillText('Get ready…',CW*.5,CH*.82);
}
function drawLevelComplete(){
  const lvl=LEVELS[gs.lvlIdx];
  BACKGROUNDS[lvl.bg](ctx,CW,CH,gs.frame,gs.bgSeeds,gs.paralax);
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,CW,CH);
  for(let i=0;i<14;i++){const fx=(Math.sin(gs.frame*.04+i*.8)*CW*.38)+CW*.5;const fy=(gs.frame*1.4+i*45)%CH;ctx.font='15px Arial';ctx.textAlign='center';ctx.fillText(['🪶','✨','🐦'][i%3],fx,fy);}
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=lvl.type==='bonus'?'#ffe066':'#C99A2E';
  ctx.font=`bold ${Math.floor(CW*.055)}px Arial`;
  ctx.shadowBlur=14;ctx.shadowColor=lvl.type==='bonus'?'#ffaa00':'gold';
  ctx.fillText(lvl.type==='bonus'?'Bonus Complete! ★':'Level Complete!',CW*.5,CH*.25);ctx.shadowBlur=0;
  ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.fillText(lvl.name,CW*.5,CH*.35);
  const acc=gs.spawnedCount>0?Math.round(gs.hitCount/gs.spawnedCount*100):100;
  ctx.fillStyle='#aaddff';ctx.font='19px Arial';
  ctx.fillText('Accuracy: '+acc+'%',CW*.5,CH*.44);ctx.fillText('Score: '+gs.score,CW*.5,CH*.51);
  if(gs.score>=highScore&&gs.score>0){ctx.fillStyle='#ffd700';ctx.fillText('🏆 New High Score!',CW*.5,CH*.58);}
  if(gs.lvlIdx<LEVELS.length-1){
    drawBtn(CW*.5,CH*.7,'Continue →','#1aefaa');
    const next=LEVELS[gs.lvlIdx+1];
    ctx.fillStyle='rgba(180,200,255,0.65)';ctx.font='15px Arial';ctx.fillText('Next: '+(next.type==='bonus'?'★ ':'')+next.name,CW*.5,CH*.79);
  } else {
    ctx.fillStyle='#ffd700';ctx.font='bold 20px Arial';ctx.fillText('🎉 All levels complete!',CW*.5,CH*.68);
    drawBtn(CW*.5,CH*.78,'Play Again','#ffaa00');
  }
}
function drawGameOver(){
  BACKGROUNDS.night_migration(ctx,CW,CH,gs.frame,gs.bgSeeds,gs.paralax);
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#ff6644';ctx.font=`bold ${Math.floor(CW*.06)}px Arial`;
  ctx.shadowBlur=14;ctx.shadowColor='#ff3300';ctx.fillText('Game Over',CW*.5,CH*.25);ctx.shadowBlur=0;
  ctx.fillStyle='white';ctx.font='bold 24px Arial';ctx.fillText('Final Score: '+gs.score,CW*.5,CH*.37);
  ctx.fillStyle='#ffd700';ctx.font='20px Arial';ctx.fillText('Best Score: '+highScore,CW*.5,CH*.45);
  ctx.fillStyle='#aaddff';ctx.font='17px Arial';ctx.fillText('Reached: '+LEVELS[gs.lvlIdx].name,CW*.5,CH*.53);
  if(gs.score>=highScore&&gs.score>0){ctx.fillStyle='#ffd700';ctx.fillText('🏆 New High Score!',CW*.5,CH*.61);}
  drawBtn(CW*.5,CH*.72,'Play Again','#1aefaa',240,48);
  drawBtn(CW*.5,CH*.83,'Main Menu','#aaaaff',240,42);
}
function drawPaused(){
  ctx.fillStyle='rgba(0,0,20,0.72)';ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='white';ctx.font=`bold ${Math.floor(CW*.052)}px Arial`;ctx.fillText('Paused',CW*.5,CH*.35);
  ctx.fillStyle='rgba(180,200,255,0.8)';ctx.font='17px Arial';ctx.fillText('Press P to resume',CW*.5,CH*.46);
  drawBtn(CW*.5,CH*.57,'▶ Resume','#1aefaa');drawBtn(CW*.5,CH*.67,'⏹ Quit','#ff6644');
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function drawBtn(x,y,t,col,w=220,h=44){
  ctx.fillStyle=col+'2a';ctx.strokeStyle=col;ctx.lineWidth=2;
  rr(ctx,x-w/2,y-h/2,w,h,10);ctx.fill();ctx.stroke();
  ctx.fillStyle=col;ctx.font='bold 17px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x,y);
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function inBtn(mx,my,cx,cy,w=220,h=44){return mx>cx-w/2&&mx<cx+w/2&&my>cy-h/2&&my<cy+h/2;}

let highScore=0;
try{highScore=parseInt(localStorage.getItem('bol_hs'))||0;}catch(e){}
function saveHS(){if(gs.score>highScore){highScore=gs.score;try{localStorage.setItem('bol_hs',highScore);}catch(e){}}}

// ══════════════════════════════════════════
// GAME FLOW
// ══════════════════════════════════════════
function startGame(li=0){
  gs=mkState();gs.lvlIdx=li;
  initBg();spawnGroundBirds();
  gs.state='LEVEL_INTRO';gs.introTimer=130;
  startAmbient();
}
function beginLevel(){
  const lvl=LEVELS[gs.lvlIdx];
  gs.letters=[];gs.particles=[];gs.popups=[];gs.flyingBirds=[];
  gs.debris=[];gs.hitCount=0;gs.spawnedCount=0;gs.lastSpawn=0;gs.streak=0;
  gs.lastStreakMilestone=0;
  spawnGroundBirds();
  if(lvl.type==='bonus'){
    gs.bonusWords=[...lvl.birdWords];gs.bonusWordIdx=0;gs.bonusLetterIdx=0;
    gs.bonusCurrentWord=gs.bonusWords[0];
  } else {gs.bonusWords=null;}
  gs.state='PLAYING';
}
function levelComplete(){
  if(gs.state!=='PLAYING')return;
  saveHS();gs.state='LEVEL_COMPLETE';playLevelUp();
}
function goNext(){
  if(gs.lvlIdx<LEVELS.length-1){gs.lvlIdx++;gs.state='LEVEL_INTRO';gs.introTimer=130;}
  else{gs.state='GAME_OVER';saveHS();}
}

// ══════════════════════════════════════════
// SPAWN
// ══════════════════════════════════════════
function spawnNormal(ts){
  const lvl=LEVELS[gs.lvlIdx];
  if(gs.letters.filter(l=>l.active).length>=lvl.maxOn)return;
  if(ts-gs.lastSpawn<lvl.spawnInterval)return;
  gs.lastSpawn=ts;
  const set=lvl.letterSet,ch=set[Math.floor(Math.random()*set.length)];
  let x,tries=0;
  do{x=CW*(.07+Math.random()*.86);tries++;}
  while(tries<20&&gs.letters.filter(l=>l.active).some(l=>Math.abs(l.x-x)<60));
  gs.letters.push({char:ch,x,y:-40,speed:lvl.fallSpeed*(.88+Math.random()*.24),active:true,wobble:Math.random()*Math.PI*2});
  gs.spawnedCount++;
}
function spawnBonus(ts){
  if(gs.letters.filter(l=>l.active).length>0)return;
  if(ts-gs.lastSpawn<900)return;
  if(!gs.bonusWords||gs.bonusWordIdx>=gs.bonusWords.length)return;
  const word=gs.bonusWords[gs.bonusWordIdx];
  if(gs.bonusLetterIdx>=word.length)return;
  gs.lastSpawn=ts;
  const ch=word[gs.bonusLetterIdx],x=CW*(.25+Math.random()*.5);
  gs.letters.push({char:ch,x,y:-40,speed:LEVELS[gs.lvlIdx].fallSpeed*(.9+Math.random()*.2),active:true,wobble:Math.random()*Math.PI*2,isBonus:true});
  gs.spawnedCount++;
}

// ══════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(gs.state==='PAUSED'){if(e.key==='p'||e.key==='P'||e.key==='Escape')gs.state='PLAYING';return;}
  if(gs.state==='LEVEL_INTRO'){gs.introTimer=0;return;}
  if(gs.state==='LEVEL_COMPLETE'){if(e.key==='Enter'||e.key===' ')goNext();return;}
  if(gs.state==='GAME_OVER'){if(e.key==='Enter'||e.key===' ')gs.state='MENU';return;}
  if(gs.state==='MENU'){if(e.key==='Enter'||e.key===' '){getAC();startGame(0);}return;}
  if(gs.state!=='PLAYING')return;
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){gs.state='PAUSED';return;}
  if(['Shift','Control','Alt','Meta','Tab','CapsLock'].includes(e.key))return;
  let key=e.key.toUpperCase();if(e.key===';')key=';';
  if(key.length>1&&key!==';')return;
  const now=performance.now();
  if(gs.lastKey[key]&&now-gs.lastKey[key]<DEBOUNCE)return;
  gs.lastKey[key]=now;
  LEVELS[gs.lvlIdx].type==='bonus'?handleBonus(key):handleNormal(key);
});

function handleNormal(key){
  const matches=gs.letters.filter(l=>l.active&&l.char===key);
  if(!matches.length){playWrong();return;}
  matches.sort((a,b)=>b.y-a.y);
  const letter=matches[0];
  gs.streak++;
  checkStreakSound();
  let pts=10+(gs.streak>=5?Math.min(25,Math.floor(gs.streak/5)*5):0);
  gs.score+=pts;gs.hitCount++;
  launchBird(letter);
  spawnPopup('+'+pts,letter.x,letter.y-20,'#ffe566');
  if(gs.hitCount>=LEVELS[gs.lvlIdx].toWin)setTimeout(levelComplete,300);
}
function handleBonus(key){
  const word=gs.bonusWords[gs.bonusWordIdx];if(!word)return;
  const expected=word[gs.bonusLetterIdx];
  const match=gs.letters.find(l=>l.active&&l.char===key);
  if(!match||key!==expected){playWrong();return;}
  gs.streak++;checkStreakSound();
  const pts=15+(gs.streak>=5?Math.min(25,Math.floor(gs.streak/5)*5):0);
  gs.score+=pts;gs.hitCount++;
  launchBird(match);
  spawnPopup('+'+pts,match.x,match.y-20,'#ffe566');
  gs.bonusLetterIdx++;
  if(gs.bonusLetterIdx>=word.length){
    gs.bonusLetterIdx=0;gs.bonusWordIdx++;
    spawnPopup('✓ '+word+'!',CW*.5,CH*.18,'#ffe066');
    if(gs.bonusWordIdx>=gs.bonusWords.length)setTimeout(levelComplete,400);
    else gs.bonusCurrentWord=gs.bonusWords[gs.bonusWordIdx];
  }
}

function checkStreakSound(){
  const milestones=[3,5,8,10,15,20];
  const reached=milestones.filter(m=>gs.streak>=m&&gs.streak<m+1||(gs.streak===m));
  const next=milestones.find(m=>m>gs.lastStreakMilestone&&gs.streak>=m);
  if(next){gs.lastStreakMilestone=next;playStreakCall(next);}
}

function missLetter(letter){
  letter.active=false;
  gs.lives--;gs.streak=0;gs.lastStreakMilestone=0;
  // spawn debris at impact point
  spawnDebris(letter.x, CH*GROUND_Y+Math.random()*20);
  spawnPopup('MISS!',letter.x,letter.y,'#ff5555');
  playWrong();
  if(gs.lives<=0)setTimeout(()=>{gs.state='GAME_OVER';saveHS();playGameOver();},300);
}

canvas.addEventListener('click',e=>{
  const x=e.clientX,y=e.clientY,s=gs.state;
  if(s==='MENU'){
    if(inBtn(x,y,CW*.5,CH*.57)){getAC();startGame(0);}
    else if(inBtn(x,y,CW*.5,CH*.66))gs.state='INSTR';
    else if(x>CW-44&&y<50){muted=!muted;if(!muted)startAmbient();else stopAmbient();}
  }else if(s==='INSTR'){if(inBtn(x,y,CW*.5,CH*.88,180,40))gs.state='MENU';}
  else if(s==='LEVEL_COMPLETE'){if(inBtn(x,y,CW*.5,CH*.7)||inBtn(x,y,CW*.5,CH*.78))goNext();}
  else if(s==='GAME_OVER'){
    if(inBtn(x,y,CW*.5,CH*.72,240,48)){gs.state='MENU';startGame(0);}
    else if(inBtn(x,y,CW*.5,CH*.83,240,42))gs.state='MENU';
  }else if(s==='PAUSED'){
    if(inBtn(x,y,CW*.5,CH*.57))gs.state='PLAYING';
    else if(inBtn(x,y,CW*.5,CH*.67))gs.state='MENU';
  }else if(s==='PLAYING'&&x>CW-44&&y<CH*HUD_H){muted=!muted;if(!muted)startAmbient();else stopAmbient();}
});

document.addEventListener('visibilitychange',()=>{if(document.hidden&&gs.state==='PLAYING')gs.state='PAUSED';});

// ══════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════
function loop(ts){
  ctx.clearRect(0,0,CW,CH);
  gs.frame++;gs.paralax+=0.18;
  const S=gs.state,lvl=LEVELS[gs.lvlIdx];

  if(S==='MENU'){drawMenu();}
  else if(S==='INSTR'){drawInstructions();}
  else if(S==='LEVEL_INTRO'){
    drawLevelIntro();gs.introTimer--;
    if(gs.introTimer<=0)beginLevel();
  }
  else if(S==='PLAYING'){
    drawBg(lvl.bg);
    lvl.type==='bonus'?spawnBonus(ts):spawnNormal(ts);

    gs.letters.forEach(l=>{
      if(!l.active)return;
      l.y+=l.speed;
      if(l.y>CH*GROUND_Y)missLetter(l);
      else drawLetter(l,gs.lvlIdx,lvl.type==='bonus');
    });
    gs.letters=gs.letters.filter(l=>l.active);

    gs.particles=gs.particles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=16;
      p.alpha=Math.max(0,(p.life/p.maxLife)**2);
      if(p.alpha>0.01){ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;return true;}
      return false;
    });

    gs.groundBirds.forEach(b=>{
      if(b.flying)return;
      b.bobPhase+=0.045;
      drawGroundBird(b.species,b.x,b.y,b.x>CW*.5,1.2,Math.sin(b.bobPhase)*3);
    });
    updateFlyingBirds();
    gs.flyingBirds.forEach(fb=>drawFlyingBird(fb.gb.species,fb.x,fb.y,fb.x>(fb.gb?fb.gb.homeX:CW*.5),gs.frame*.35));

    gs.popups=gs.popups.filter(p=>{
      p.y+=p.vy;p.life--;p.alpha=Math.max(0,p.life/55);
      if(p.alpha>0){ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1;return true;}
      return false;
    });

    if(lvl.type==='bonus')drawBonusBar();
    drawHUD(lvl);
  }
  else if(S==='PAUSED'){
    drawBg(lvl.bg);
    gs.groundBirds.forEach(b=>{if(!b.flying)drawGroundBird(b.species,b.x,b.y,b.x>CW*.5,1.2,0);});
    gs.letters.forEach(l=>{if(l.active)drawLetter(l,gs.lvlIdx,lvl.type==='bonus');});
    drawHUD(lvl);drawPaused();
  }
  else if(S==='LEVEL_COMPLETE'){drawLevelComplete();}
  else if(S==='GAME_OVER'){drawGameOver();}

  requestAnimationFrame(loop);
}

initBg();
requestAnimationFrame(loop);
</script>
